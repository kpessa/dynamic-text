<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightSwitch Test</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        [data-theme="light"] {
            background-color: #ffffff;
            color: #000000;
        }
        
        [data-theme="dark"] {
            background-color: #1a1a1a;
            color: #ffffff;
        }
        
        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #f0f0f0;
            color: #333;
            transition: background-color 0.2s;
        }
        
        [data-theme="dark"] .btn-icon {
            background-color: #333;
            color: #fff;
        }
        
        .btn-icon:hover {
            background-color: #e0e0e0;
        }
        
        [data-theme="dark"] .btn-icon:hover {
            background-color: #444;
        }
        
        .material-icons {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>LightSwitch Test</h1>
    <p>Current theme: <span id="theme-display">light</span></p>
    
    <button 
        class="btn-icon"
        onclick="toggleTheme()"
        title="Toggle theme"
        aria-label="Toggle theme"
    >
        <span class="material-icons" id="theme-icon">dark_mode</span>
    </button>
    
    <script>
        let isDark = false;
        
        function updateThemeDisplay() {
            const theme = document.documentElement.getAttribute('data-theme');
            document.getElementById('theme-display').textContent = theme;
            document.getElementById('theme-icon').textContent = isDark ? 'light_mode' : 'dark_mode';
        }
        
        function toggleTheme() {
            isDark = !isDark;
            const newTheme = isDark ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeDisplay();
        }
        
        // Initialize theme from localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            isDark = savedTheme === 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        updateThemeDisplay();
    </script>
</body>
</html>
