<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test KPT Functionality</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            cursor: pointer;
        }
        #results {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>KPT Function Manager Test</h1>
    
    <div class="test-section">
        <h2>Test Custom Function Creation</h2>
        <button onclick="testCreateFunction()">Create Test Function</button>
        <button onclick="testLoadFunctions()">Load Functions</button>
        <button onclick="clearStorage()">Clear Storage</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        const KPT_STORAGE_KEY = 'kpt_custom_functions';
        
        function testCreateFunction() {
            const testFunction = {
                name: 'testFunction_' + Date.now(),
                parameters: 'text, value',
                body: 'return `Test: ${text} = ${value}`;',
                description: 'Test function created at ' + new Date().toISOString(),
                category: 'CUSTOM',
                createdAt: new Date().toISOString(),
                modifiedAt: new Date().toISOString()
            };
            
            // Get existing functions
            const existing = JSON.parse(localStorage.getItem(KPT_STORAGE_KEY) || '[]');
            existing.push(testFunction);
            
            // Save to localStorage
            localStorage.setItem(KPT_STORAGE_KEY, JSON.stringify(existing));
            
            showResult('success', `Created function: ${testFunction.name}`);
            testLoadFunctions();
        }
        
        function testLoadFunctions() {
            const functions = JSON.parse(localStorage.getItem(KPT_STORAGE_KEY) || '[]');
            
            if (functions.length === 0) {
                showResult('error', 'No functions found in storage');
            } else {
                const html = functions.map(f => `
                    <div>
                        <strong>${f.name}</strong> - ${f.description || 'No description'}
                        <br>Category: ${f.category}
                        <br>Created: ${new Date(f.createdAt).toLocaleString()}
                    </div>
                `).join('<hr>');
                
                showResult('success', `Found ${functions.length} function(s):<br><br>${html}`);
            }
        }
        
        function clearStorage() {
            localStorage.removeItem(KPT_STORAGE_KEY);
            showResult('success', 'Storage cleared');
        }
        
        function showResult(type, message) {
            document.getElementById('results').innerHTML = `
                <div class="${type}">
                    <strong>${type === 'success' ? '✅' : '❌'}</strong>
                    ${message}
                </div>
            `;
        }
        
        // Load functions on page load
        window.onload = () => {
            testLoadFunctions();
        };
    </script>
</body>
</html>
